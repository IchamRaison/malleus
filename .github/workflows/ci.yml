name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
      - name: Run tests
        run: pytest -q
      - name: Run static sanity checks
        run: ruff check src tests scripts
      - name: Build and verify installable package assets
        run: |
          python -m build
          wheel_path=$(ls dist/malleus_evals-*.whl | head -n 1)
          python scripts/install_smoke.py --wheel "$wheel_path"
          tmp_dir=$(mktemp -d)
          python -m pip install --no-deps --target "$tmp_dir/pkg" "$wheel_path"
          cd /tmp
          PYTHONPATH="$tmp_dir/pkg" python - <<'PY'
          from malleus.datasets import load_release_matrix, load_scoring_config, validate_release_matrix_references
          from malleus.resources import resource_path

          matrix_path = resource_path("datasets/release_matrices/malleus-v0.1.yaml")
          scoring_path = resource_path("configs/scoring-default.yaml")
          assert matrix_path.exists(), matrix_path
          assert scoring_path.exists(), scoring_path
          matrix = validate_release_matrix_references(load_release_matrix(matrix_path))
          scoring = load_scoring_config(scoring_path)
          assert len(matrix.packs) >= 1
          assert scoring.max_score > 0
          PY
      - name: Validate CLI dry run
        run: |
          malleus version
          malleus quickstart
          malleus v1-readiness
          malleus prod-readiness
          malleus list-cases --input datasets/benchmark_packs/smoke-v1.yaml
          python - <<'PY'
          from malleus.assessment_catalog import load_assessment_catalog

          assert len(load_assessment_catalog().packs) > 0
          PY
          malleus validate --input datasets/benchmark_packs/smoke-v1.yaml --json > /tmp/malleus-validate.json
          malleus run \
            --target examples/targets/openai.yaml \
            --input datasets/benchmark_packs/smoke-v1.yaml \
            --scoring configs/scoring-default.yaml \
            --out-dir /tmp/malleus-dry \
            --dry-run
          malleus assess \
            --target examples/targets/openai.yaml \
            --profile rag-agent \
            --packs core,rag \
            --mode dry_run \
            --out-dir /tmp/malleus-assessment-dry
          set +e
          malleus assess \
            --target examples/targets/openai.yaml \
            --profile chatbot \
            --packs core \
            --mode live_provider \
            --out-dir /tmp/malleus-assessment-live-fail \
            --allow-live-provider
          live_status=$?
          set -e
          if [ "$live_status" -eq 0 ]; then
            echo "live_provider assessment smoke unexpectedly succeeded"
            exit 1
          fi
          python - <<'PY'
          import json
          from pathlib import Path

          manifest = json.loads(Path("/tmp/malleus-assessment-live-fail/assessment-manifest.json").read_text())
          assert manifest["provider_calls_enabled"] is False
          assert manifest["network_enabled"] is False
          assert manifest["posture"] == "error"
          risk_report = json.loads(Path("/tmp/malleus-assessment-live-fail/risk-report.json").read_text())
          assert risk_report["scores"]["posture"] == "error"
          assert risk_report["scores"]["error_count"] >= 1
          assert risk_report["gate"]["status"] == "error"
          PY
          malleus gate --report /tmp/malleus-dry/dry-run.json > /tmp/malleus-gate.json
          malleus dashboard \
            --report /tmp/malleus-dry/dry-run.json \
            --out-dir /tmp/malleus-dashboard
          malleus mutate-run \
            --target examples/targets/openai.yaml \
            --input datasets/benchmark_packs/smoke-v1.yaml \
            --scoring configs/scoring-default.yaml \
            --out-dir /tmp/malleus-mutation-dry \
            --mutation spacing \
            --limit 1 \
            --dry-run
          malleus agent-lab \
            --target examples/targets/openai.yaml \
            --scenarios datasets/agentic/agentic_injection_smoke.yaml \
            --out-dir /tmp/malleus-agent-dry \
            --limit 1 \
            --dry-run
          malleus run \
            --target examples/targets/openai.yaml \
            --input datasets/benchmark_packs/smoke-v1.yaml \
            --scoring configs/scoring-default.yaml \
            --out-dir /tmp/malleus-dry-new \
            --dry-run
          malleus diff-runs \
            --old /tmp/malleus-dry/dry-run.json \
            --new /tmp/malleus-dry-new/dry-run.json \
            --out-dir /tmp/malleus-diff
          python - <<'PY'
          from pathlib import Path

          from malleus.compare import write_comparison_report

          write_comparison_report(
              [Path("/tmp/malleus-dry/dry-run.json"), Path("/tmp/malleus-dry-new/dry-run.json")],
              Path("/tmp/malleus-comparison"),
          )
          PY
          malleus evidence-bundle \
            --title "CI smoke evidence bundle" \
            --run-report /tmp/malleus-dry/dry-run.json \
            --mutation-report /tmp/malleus-mutation-dry/mutation-dry-run.json \
            --agent-report /tmp/malleus-agent-dry/agent-lab-dry-run.json \
            --diff-report /tmp/malleus-diff/diff-runs-report.json \
            --out-dir /tmp/malleus-evidence
          python - <<'PY'
          import json
          from pathlib import Path

          artifacts = {
              "validate": Path("/tmp/malleus-validate.json"),
              "gate": Path("/tmp/malleus-gate.json"),
              "dry-run-json": Path("/tmp/malleus-dry/dry-run.json"),
              "dry-run-md": Path("/tmp/malleus-dry/dry-run.md"),
              "dashboard": Path("/tmp/malleus-dashboard/index.html"),
              "mutation-json": Path("/tmp/malleus-mutation-dry/mutation-dry-run.json"),
              "mutation-md": Path("/tmp/malleus-mutation-dry/mutation-dry-run.md"),
              "agent-json": Path("/tmp/malleus-agent-dry/agent-lab-dry-run.json"),
              "agent-md": Path("/tmp/malleus-agent-dry/agent-lab-dry-run.md"),
              "diff-json": Path("/tmp/malleus-diff/diff-runs-report.json"),
              "diff-md": Path("/tmp/malleus-diff/diff-runs-report.md"),
              "comparison-json": Path("/tmp/malleus-comparison/comparison.json"),
              "comparison-md": Path("/tmp/malleus-comparison/comparison.md"),
              "evidence": Path("/tmp/malleus-evidence/index.html"),
          }
          missing = [name for name, path in artifacts.items() if not path.exists() or path.stat().st_size == 0]
          assert not missing, missing
          assert json.loads(artifacts["validate"].read_text())["ok"] is True
          assert json.loads(artifacts["gate"].read_text())["status"] in {"pass", "warn"}
          assert json.loads(artifacts["mutation-json"].read_text())["summary"]["total_mutated_items"] >= 1
          assert json.loads(artifacts["agent-json"].read_text())["summary"]["total_scenarios"] == 1
          assert len(json.loads(artifacts["comparison-json"].read_text())) == 2
          assert "Malleus model comparison" in artifacts["comparison-md"].read_text()
          assert "Malleus Benchmark Dashboard" in artifacts["dashboard"].read_text()
          assert "Security evaluation evidence bundle" in artifacts["evidence"].read_text()
          PY
