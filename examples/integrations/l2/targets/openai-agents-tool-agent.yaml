name: l2-openai-agents-tool-agent
target_type: tool_agent
tool_agent:
  endpoint_url: http://127.0.0.1:8789/malleus/tool-agent
  auth:
    bearer_token_env: MALLEUS_EXAMPLE_AGENT_TOKEN
  allowed_tools:
    - classify_ticket
  request:
    timeout: 10
metadata:
  agent_framework: openai_agents
  agent_target_depth: L2
  example_agent: examples.integrations.l2.agents.openai_agents_tool_agent:agent
  example_runner: examples.integrations.l2.agents.openai_agents_tool_agent:runner
