name: l2-openai-agents-official-minimal
target_type: tool_agent
tool_agent:
  endpoint_url: http://127.0.0.1:8794/malleus/tool-agent
  auth:
    bearer_token_env: MALLEUS_EXAMPLE_AGENT_TOKEN
  allowed_tools:
    - classify_ticket
  request:
    timeout: 10
metadata:
  agent_framework: openai_agents
  agent_target_depth: L2
  side_effect_safety: local_only
  official_sdk_example: true
  provider_free_by_default: true
  example_agent: examples.integrations.l2.agents.openai_agents_official_minimal:agent
  example_runner: examples.integrations.l2.agents.openai_agents_official_minimal:runner
  note: Uses official OpenAI Agents SDK when openai-agents is installed; local deterministic model prevents network calls by default.
