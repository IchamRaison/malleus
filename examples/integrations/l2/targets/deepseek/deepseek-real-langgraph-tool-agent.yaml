name: deepseek-real-langgraph-tool-agent
target_type: tool_agent
tool_agent:
  endpoint_url: http://127.0.0.1:8872/malleus/tool-agent
  auth:
    bearer_token_env: MALLEUS_EXAMPLE_AGENT_TOKEN
  allowed_tools:
    - classify_ticket
    - read_policy
    - search
    - no_tool_available
  request:
    timeout: 120
    max_tokens: 512
metadata:
  agent_framework: langgraph
  agent_target_depth: L2
  backed_by: deepseek-v4-flash
  example_agent: examples.integrations.l2.agents.deepseek_real_agents:langgraph_graph
