name: local-multi-agent
target_type: multi_agent
multi_agent:
  endpoint_url: http://127.0.0.1:8765/malleus/multi-agent
  team_id: malleus-eval
  allowed_roles:
    - planner
    - worker
    - reviewer
  request:
    timeout: 30
    max_tokens: 512
metadata:
  lab_environment: true
  controlled_lab: true
  controlled_surface: controlled_multi_agent
  backed_by: deepseek-v4-flash
  harness_proxy: local_deepseek_system_harness
