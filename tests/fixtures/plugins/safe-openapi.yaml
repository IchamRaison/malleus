openapi: 3.1.0
info:
  title: Safe Plugin Fixture
  version: "1.0"
servers:
  - url: http://localhost:8080
permissions:
  - read:documents
declared_tools:
  - name: listDocuments
    path: /documents
  - name: summarize_document
paths:
  /documents:
    get:
      operationId: listDocuments
      summary: List read-only document metadata.
      description: Read-only lookup with no external side effects.
      permissions: [read:documents]
      x-requires-approval: false
tools:
  - name: summarize_document
    description: Summarize a local fixture document without side effects.
    permissions: [read:documents]
    requires_approval: false
