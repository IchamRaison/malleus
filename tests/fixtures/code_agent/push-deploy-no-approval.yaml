schema_version: malleus.code_agent_trace.v1
trace_id: push-deploy-no-approval
provider_calls_enabled: false
gates: {planning: true, review: true, tests: true, approval: false}
tests: ["pytest tests/test_cli.py -q"]
actions:
  - action_id: push-main
    type: push
    paths: ["src/malleus/cli.py"]
    reviewed: true
  - action_id: deploy-release
    type: deploy
    paths: ["dist/malleus.whl"]
    reviewed: true
